<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For her</title>
<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Tangerine:wght@400;700&family=Caveat:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Bodoni+Moda:ital,wght@0,400;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/react-beautiful-dnd@13.1.1/dist/react-beautiful-dnd.min.js"></script>
</head>
<body>

<div id="root"></div>

<script>
window.addEventListener('error', function (event) {
  const root = document.getElementById('root') || document.body;
  root.innerHTML = '<pre style="white-space:pre-wrap;padding:24px;color:#f6ecd8;background:#120b0b;font:14px/1.5 monospace;">Runtime error:\n' +
    String(event.message || 'Unknown error') +
    (event.filename ? '\n\n' + event.filename + (event.lineno ? ':' + event.lineno : '') : '') +
    '</pre>';
});
window.addEventListener('unhandledrejection', function (event) {
  const root = document.getElementById('root') || document.body;
  root.innerHTML = '<pre style="white-space:pre-wrap;padding:24px;color:#f6ecd8;background:#120b0b;font:14px/1.5 monospace;">Unhandled promise rejection:\n' +
    String(event.reason || 'Unknown rejection') +
    '</pre>';
});
</script>

<script src="packages/story-content/src/storyData.js"></script>
<script src="content.js"></script>
<script type="text/babel" src="Envelope.jsx"></script>
<script type="text/babel" src="Prologue.jsx"></script>
<script type="text/babel" src="TaskCard.jsx"></script>
<script type="text/babel" src="App.jsx"></script>

</body>
</html>
